<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>A-Frame GLB Viewer</title>

  <!-- A-Frame 라이브러리 -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <a-scene>

    <!-- ===================== -->
    <!-- Assets: 3D 모델 로드 -->
    <!-- ===================== -->
    <a-assets>
      <!-- model.glb 파일을 미리 로드 -->
      <a-asset-item id="model" src="model.glb"></a-asset-item>
    </a-assets>

    <!-- ===================== -->
    <!-- 카메라 리그 (이동용) -->
    <!-- ===================== -->
    <!-- rig를 움직이면 카메라도 같이 이동 -->
    <a-entity id="rig" position="0 1.6 2">
      
      <!-- 카메라 -->
      <!-- look-controls: 마우스로 시점 회전 -->
      <!-- wasd-controls: 키보드(방향키/WASD) 이동 -->
      <a-entity
        camera
        look-controls
        wasd-controls="acceleration: 25"
        position="0 0 0">
      </a-entity>

    </a-entity>

    <!-- ===================== -->
    <!-- 마우스 휠 줌 기능 -->
    <!-- ===================== -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const rig = document.querySelector('#rig');

        window.addEventListener('wheel', (event) => {
          let pos = rig.getAttribute('position');

          // 줌 속도
          const zoomSpeed = 0.5;

          // 휠 위 (줌인)
          if (event.deltaY < 0) {
            pos.z -= zoomSpeed;
          } 
          // 휠 아래 (줌아웃)
          else {
            pos.z += zoomSpeed;
          }

          // 위치 업데이트
          rig.setAttribute('position', pos);
        });
      });
    </script>

    <!-- ===================== -->
    <!-- 3D 모델 (메인) -->
    <!-- ===================== -->
    <!-- 카메라 앞에 크게 보이도록 배치 -->
    <a-entity
      gltf-model="#model"
      position="0 0 -2"
      scale="2.5 2.5 2.5">
    </a-entity>

    <!-- ===================== -->
    <!-- 바닥 -->
    <!-- ===================== -->
    <a-plane
      rotation="-90 0 0"
      width="30"
      height="30"
      color="#8BC34A">
    </a-plane>

    <!-- ===================== -->
    <!-- 하늘 -->
    <!-- ===================== -->
    <a-sky color="#DCEFFF"></a-sky>

    <!-- ===================== -->
    <!-- 조명 -->
    <!-- ===================== -->
    <!-- 기본 밝기 -->
    <a-light type="ambient" intensity="0.6"></a-light>

    <!-- 방향 조명 -->
    <a-light
      type="directional"
      position="2 4 3"
      intensity="0.9">
    </a-light>

    <!-- ===================== -->
    <!-- VR 컨트롤러 -->
    <!-- ===================== -->
    <!-- 왼손 -->
    <a-entity laser-controls="hand: left"></a-entity>

    <!-- 오른손 -->
    <a-entity laser-controls="hand: right"></a-entity>

  </a-scene>
</body>
</html>
