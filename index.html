<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>A-Frame GLB Fit Screen</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <a-scene>

    <!-- ===================== -->
    <!-- Assets -->
    <!-- ===================== -->
    <a-assets>
      <a-asset-item id="model" src="model.glb"></a-asset-item>
    </a-assets>

    <!-- ===================== -->
    <!-- 카메라 리그 -->
    <!-- ===================== -->
    <a-entity id="rig" position="0 1.6 5">
      <a-entity
        id="camera"
        camera
        look-controls
        wasd-controls="acceleration: 25">
      </a-entity>
    </a-entity>

    <!-- ===================== -->
    <!-- 마우스 휠 줌 -->
    <!-- ===================== -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const rig = document.querySelector('#rig');

        window.addEventListener('wheel', (event) => {
          let pos = rig.getAttribute('position');
          const speed = 0.7;

          if (event.deltaY < 0) pos.z -= speed;
          else pos.z += speed;

          rig.setAttribute('position', pos);
        });
      });
    </script>

    <!-- ===================== -->
    <!-- GLB 모델 -->
    <!-- ===================== -->
    <a-entity
      id="modelEntity"
      gltf-model="#model"
      position="0 0 0">
    </a-entity>

    <!-- ===================== -->
    <!-- 화면에 딱 맞게 자동 조정 -->
    <!-- ===================== -->
    <script>
      AFRAME.registerComponent('fit-to-screen', {
        init: function () {
          this.el.addEventListener('model-loaded', () => {

            const model = this.el.getObject3D('mesh');
            const camera = document.querySelector('#camera').getObject3D('camera');

            // bounding box 계산
            const box = new THREE.Box3().setFromObject(model);
            const size = new THREE.Vector3();
            const center = new THREE.Vector3();

            box.getSize(size);
            box.getCenter(center);

            // 모델 중앙 정렬
            model.position.sub(center);

            // 카메라 시야각 (FOV)
            const fov = camera.fov * (Math.PI / 180);

            // 모델 높이를 기준으로 거리 계산
            const modelHeight = size.y;
            const distance = (modelHeight / 2) / Math.tan(fov / 2);

            // 카메라 위치 조정 (모델이 화면에 꽉 차게)
            const rig = document.querySelector('#rig');
            rig.setAttribute('position', {
              x: 0,
              y: modelHeight / 2,
              z: distance * 1.2   // 약간 여유
            });

          });
        }
      });

      // 컴포넌트 적용
      document.addEventListener('DOMContentLoaded', () => {
        document
          .querySelector('#modelEntity')
          .setAttribute('fit-to-screen', '');
      });
    </script>

    <!-- ===================== -->
    <!-- 바닥 -->
    <!-- ===================== -->
    <a-plane
      rotation="-90 0 0"
      width="50"
      height="50"
      color="#7BC8A4">
    </a-plane>

    <!-- ===================== -->
    <!-- 하늘 -->
    <!-- ===================== -->
    <a-sky color="#ECECEC"></a-sky>

    <!-- ===================== -->
    <!-- 조명 -->
    <!-- ===================== -->
    <a-light type="ambient" intensity="0.7"></a-light>

    <a-light
      type="directional"
      position="3 5 4"
      intensity="1">
    </a-light>

    <!-- ===================== -->
    <!-- VR 컨트롤러 -->
    <!-- ===================== -->
    <a-entity laser-controls="hand: left"></a-entity>
    <a-entity laser-controls="hand: right"></a-entity>

  </a-scene>
</body>
</html>
