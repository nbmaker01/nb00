<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>A-Frame GLB Proper Ground Fix</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <a-scene>

    <!-- ===================== -->
    <!-- Assets -->
    <!-- ===================== -->
    <a-assets>
      <a-asset-item id="model" src="model.glb"></a-asset-item>
    </a-assets>

    <!-- ===================== -->
    <!-- 카메라 (사람 시점) -->
    <!-- ===================== -->
    <a-entity id="rig" position="0 1.6 8">
      <a-entity
        id="camera"
        camera
        look-controls
        wasd-controls="acceleration: 30">
      </a-entity>
    </a-entity>

    <!-- ===================== -->
    <!-- 마우스 휠 줌 -->
    <!-- ===================== -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const rig = document.querySelector('#rig');

        window.addEventListener('wheel', (event) => {
          let pos = rig.getAttribute('position');
          const speed = 1;

          if (event.deltaY < 0) pos.z -= speed;
          else pos.z += speed;

          rig.setAttribute('position', pos);
        });
      });
    </script>

    <!-- ===================== -->
    <!-- GLB 모델 -->
    <!-- ===================== -->
    <a-entity
      id="modelEntity"
      gltf-model="#model"
      position="0 0 0">
    </a-entity>

    <!-- ===================== -->
    <!-- 모델 위치 & 크기 보정 (핵심 수정) -->
    <!-- ===================== -->
    <script>
      AFRAME.registerComponent('fix-model-ground', {
        init: function () {
          this.el.addEventListener('model-loaded', () => {

            const model = this.el.getObject3D('mesh');

            const box = new THREE.Box3().setFromObject(model);
            const size = new THREE.Vector3();
            const center = new THREE.Vector3();

            box.getSize(size);
            box.getCenter(center);

            // 모델 중앙 정렬
            model.position.sub(center);

            // =========================
            // 크기 확대 (건물처럼 크게)
            // =========================
            const desiredHeight = 8;
            const scale = desiredHeight / size.y;

            this.el.setAttribute('scale', {
              x: scale,
              y: scale,
              z: scale
            });

            // =========================
            // 바닥에 정확히 붙이기 (중요!)
            // =========================
            const newBox = new THREE.Box3().setFromObject(this.el.object3D);
            const minY = newBox.min.y;

            // 바닥(y=0)에 맞춤
            this.el.object3D.position.y -= minY;

            // =========================
            // 카메라 위치 (바닥이 보이게)
            // =========================
            const rig = document.querySelector('#rig');

            rig.setAttribute('position', {
              x: 0,
              y: 1.6,
              z: size.z * scale * 1.8
            });

          });
        }
      });

      document.addEventListener('DOMContentLoaded', () => {
        document
          .querySelector('#modelEntity')
          .setAttribute('fix-model-ground', '');
      });
    </script>

    <!-- ===================== -->
    <!-- 바닥 -->
    <!-- ===================== -->
    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="200"
      height="200"
      color="#7BC8A4">
    </a-plane>

    <!-- ===================== -->
    <!-- 하늘 -->
    <!-- ===================== -->
    <a-sky color="#BFDFFF"></a-sky>

    <!-- ===================== -->
    <!-- 조명 -->
    <!-- ===================== -->
    <a-light type="ambient" intensity="0.7"></a-light>

    <a-light
      type="directional"
      position="5 10 5"
      intensity="1.2">
    </a-light>

    <!-- ===================== -->
    <!-- VR 컨트롤러 -->
    <!-- ===================== -->
    <a-entity laser-controls="hand: left"></a-entity>
    <a-entity laser-controls="hand: right"></a-entity>

  </a-scene>
</body>
</html>
