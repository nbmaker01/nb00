<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>WebXR A-Frame Example</title>
    <!-- A-Frame 라이브러리 불러오기 -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- VR 컨트롤러와 WASD 이동을 위한 extras -->
    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <!-- A-Frame 씬 시작 -->
    <a-scene 
      vr-mode-ui="enabled: true"  <!-- VR 모드 UI 활성화 -->
      background="color: #ECECEC"  <!-- 기본 배경 색 -->
      cursor="rayOrigin: mouse">    <!-- 마우스 커서 활성화 (PC용) -->

      <!-- 바닥 만들기 -->
      <a-plane 
        position="0 0 0" 
        rotation="-90 0 0" 
        width="20" 
        height="20" 
        color="#7BC8A4" 
        shadow>
      </a-plane>

      <!-- 하늘 만들기 -->
      <a-sky color="#87CEEB"></a-sky>

      <!-- 조명 설정 -->
      <a-entity light="type: ambient; intensity: 0.5"></a-entity> <!-- 기본 주변광 -->
      <a-entity light="type: directional; intensity: 1" position="5 10 5" rotation="-45 45 0" castShadow></a-entity> <!-- 태양빛 같은 방향광 -->

      <!-- 3D 모델 불러오기 -->
      <a-entity 
        gltf-model="#model"
        position="0 0  -3"   <!-- 앞쪽 중앙 -->
        scale="2 2 2"        <!-- 적당히 크게 -->
        rotation="0 30 0"    <!-- 약간 돌아간 상태 -->
        shadow>
      </a-entity>

      <!-- 모델 정의 -->
      <a-assets>
        <a-asset-item id="model" src="model.glb"></a-asset-item>
      </a-assets>

      <!-- 카메라 및 컨트롤 -->
      <a-entity id="player" position="0 1.6 5">
        <!-- WASD와 마우스 컨트롤 (PC용) -->
        <a-entity 
          camera 
          wasd-controls 
          look-controls
          position="0 0 0">
        </a-entity>

        <!-- VR 컨트롤러 지원 -->
        <a-entity oculus-touch-controls="hand: left"></a-entity>
        <a-entity oculus-touch-controls="hand: right"></a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
