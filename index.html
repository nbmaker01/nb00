<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>A-Frame Building Scale Viewer</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <a-scene>

    <!-- ===================== -->
    <!-- Assets -->
    <!-- ===================== -->
    <a-assets>
      <a-asset-item id="model" src="model.glb"></a-asset-item>
    </a-assets>

    <!-- ===================== -->
    <!-- 카메라 (사람 키 기준) -->
    <!-- ===================== -->
    <a-entity id="rig" position="0 1.6 10">
      <a-entity
        id="camera"
        camera
        look-controls
        wasd-controls="acceleration: 30">
      </a-entity>
    </a-entity>

    <!-- ===================== -->
    <!-- 마우스 휠 줌 -->
    <!-- ===================== -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const rig = document.querySelector('#rig');

        window.addEventListener('wheel', (event) => {
          let pos = rig.getAttribute('position');
          const speed = 1;

          if (event.deltaY < 0) pos.z -= speed;
          else pos.z += speed;

          rig.setAttribute('position', pos);
        });
      });
    </script>

    <!-- ===================== -->
    <!-- GLB 모델 -->
    <!-- ===================== -->
    <a-entity
      id="modelEntity"
      gltf-model="#model"
      position="0 0 0">
    </a-entity>

    <!-- ===================== -->
    <!-- 건물 크기로 자동 보정 -->
    <!-- ===================== -->
    <script>
      AFRAME.registerComponent('real-scale-building', {
        init: function () {
          this.el.addEventListener('model-loaded', () => {

            const model = this.el.getObject3D('mesh');

            // 모델 bounding box 계산
            const box = new THREE.Box3().setFromObject(model);
            const size = new THREE.Vector3();
            const center = new THREE.Vector3();

            box.getSize(size);
            box.getCenter(center);

            // 모델 중앙 정렬
            model.position.sub(center);

            // =========================
            // 핵심: 건물 크기로 스케일 조정
            // 목표 높이 (건물 느낌: 약 10m)
            // =========================
            const desiredHeight = 10; // 10미터 건물

            const scale = desiredHeight / size.y;

            this.el.setAttribute('scale', {
              x: scale,
              y: scale,
              z: scale
            });

            // 바닥에 맞추기
            this.el.object3D.position.y = (size.y * scale) / 2;

            // =========================
            // 카메라 위치 자동 조정
            // =========================
            const rig = document.querySelector('#rig');

            rig.setAttribute('position', {
              x: 0,
              y: 1.6,              // 사람 눈높이
              z: size.z * scale * 1.5  // 건물 앞 거리
            });

          });
        }
      });

      // 컴포넌트 적용
      document.addEventListener('DOMContentLoaded', () => {
        document
          .querySelector('#modelEntity')
          .setAttribute('real-scale-building', '');
      });
    </script>

    <!-- ===================== -->
    <!-- 바닥 -->
    <!-- ===================== -->
    <a-plane
      rotation="-90 0 0"
      width="200"
      height="200"
      color="#7BC8A4">
    </a-plane>

    <!-- ===================== -->
    <!-- 하늘 -->
    <!-- ===================== -->
    <a-sky color="#BFDFFF"></a-sky>

    <!-- ===================== -->
    <!-- 조명 -->
    <!-- ===================== -->
    <a-light type="ambient" intensity="0.7"></a-light>

    <a-light
      type="directional"
      position="5 10 5"
      intensity="1.2">
    </a-light>

    <!-- ===================== -->
    <!-- VR 컨트롤러 -->
    <!-- ===================== -->
    <a-entity laser-controls="hand: left"></a-entity>
    <a-entity laser-controls="hand: right"></a-entity>

  </a-scene>
</body>
</html>
