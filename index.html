<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A-Frame GLB Example</title>
    <!-- A-Frame 라이브러리 불러오기 -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>

  <body>
    <!-- A-Frame 씬 시작 -->
    <a-scene>
      
      <!-- 자산(3D 모델 등) 미리 로드 -->
      <a-assets>
        <!-- GLB 모델 파일 불러오기 -->
        <a-asset-item id="myModel" src="model.glb"></a-asset-item>
      </a-assets>

      <!-- 하늘(배경) 설정 -->
      <a-sky color="#ECECEC"></a-sky>

      <!-- 바닥 설정 -->
      <a-plane 
        rotation="-90 0 0" 
        width="20" 
        height="20" 
        color="#7BC8A4">
      </a-plane>

      <!-- 기본 조명 설정 -->
      <!-- 주변광 (전체 밝기) -->
      <a-light type="ambient" color="#FFFFFF" intensity="0.6"></a-light>
      <!-- 방향광 (태양 역할) -->
      <a-light 
        type="directional" 
        position="5 10 7" 
        intensity="0.8">
      </a-light>

      <!-- 3D 모델 배치 -->
      <!-- 카메라 앞쪽(0, 1, -3)에 위치 -->
      <a-entity 
        gltf-model="#myModel" 
        position="0 0 -3" 
        scale="1 1 1">
      </a-entity>

      <!-- 카메라 및 이동 설정 -->
      <a-entity id="rig" position="0 1.6 0">
        
        <!-- 카메라 (마우스로 시점 회전 가능) -->
        <a-camera 
          wasd-controls="acceleration: 20" 
          look-controls="pointerLockEnabled: true">
        </a-camera>

        <!-- VR 컨트롤러 (왼손) -->
        <a-entity 
          laser-controls="hand: left">
        </a-entity>

        <!-- VR 컨트롤러 (오른손) -->
        <a-entity 
          laser-controls="hand: right">
        </a-entity>

      </a-entity>

    </a-scene>
  </body>
</html>
