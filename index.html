<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>A-Frame GLB Viewer (Final Fix)</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <a-scene>

    <!-- ===================== -->
    <!-- Assets -->
    <!-- ===================== -->
    <a-assets>
      <a-asset-item id="model" src="model.glb"></a-asset-item>
    </a-assets>

    <!-- ===================== -->
    <!-- 카메라 (속도 낮춤) -->
    <!-- ===================== -->
    <a-entity id="rig" position="0 1.6 12">
      <a-entity
        id="camera"
        camera
        look-controls="pointerLockEnabled: true"
        wasd-controls="acceleration: 8"> <!-- 속도 ↓ -->
      </a-entity>
    </a-entity>

    <!-- ===================== -->
    <!-- 마우스 휠 줌 (속도 낮춤) -->
    <!-- ===================== -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const rig = document.querySelector('#rig');

        window.addEventListener('wheel', (event) => {
          let pos = rig.getAttribute('position');
          const speed = 0.5; // 줌 속도 ↓

          if (event.deltaY < 0) pos.z -= speed;
          else pos.z += speed;

          rig.setAttribute('position', pos);
        });
      });
    </script>

    <!-- ===================== -->
    <!-- GLB 모델 -->
    <!-- ===================== -->
    <a-entity
      id="modelEntity"
      gltf-model="#model"
      position="0 0 0">
    </a-entity>

    <!-- ===================== -->
    <!-- 모델 크기 + 바닥 + 카메라 완전 보정 -->
    <!-- ===================== -->
    <script>
      AFRAME.registerComponent('proper-scale', {
        init: function () {
          this.el.addEventListener('model-loaded', () => {

            const obj = this.el.getObject3D('mesh');

            // 1. 원본 크기 측정
            const box = new THREE.Box3().setFromObject(obj);
            const size = new THREE.Vector3();
            const center = new THREE.Vector3();

            box.getSize(size);
            box.getCenter(center);

            // 2. 모델 중심 정렬
            obj.position.sub(center);

            // 3. 크게 확대 (건물 느낌)
            const desiredHeight = 6;
            const scale = desiredHeight / size.y;

            this.el.setAttribute('scale', `${scale} ${scale} ${scale}`);

            // 4. 다시 bounding 계산 (스케일 반영)
            const box2 = new THREE.Box3().setFromObject(this.el.object3D);

            // 5. 바닥 정확히 맞추기
            const minY = box2.min.y;
            this.el.object3D.position.y -= minY;

            // 6. 카메라 위치 재설정 (바닥 보이게)
            const rig = document.querySelector('#rig');

            rig.setAttribute('position', {
              x: 0,
              y: 1.6,
              z: Math.max(size.z * scale * 2, 10) // 충분히 뒤로
            });

          });
        }
      });

      document.addEventListener('DOMContentLoaded', () => {
        document
          .querySelector('#modelEntity')
          .setAttribute('proper-scale', '');
      });
    </script>

    <!-- ===================== -->
    <!-- 바닥 (항상 보이게 크게) -->
    <!-- ===================== -->
    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="500"
      height="500"
      color="#7BC8A4">
    </a-plane>

    <!-- ===================== -->
    <!-- 하늘 -->
    <!-- ===================== -->
    <a-sky color="#BFDFFF"></a-sky>

    <!-- ===================== -->
    <!-- 조명 -->
    <!-- ===================== -->
    <a-light type="ambient" intensity="0.8"></a-light>

    <a-light
      type="directional"
      position="5 10 5"
      intensity="1.2">
    </a-light>

    <!-- ===================== -->
    <!-- VR 컨트롤러 -->
    <!-- ===================== -->
    <a-entity laser-controls="hand: left"></a-entity>
    <a-entity laser-controls="hand: right"></a-entity>

  </a-scene>
</body>
</html>
