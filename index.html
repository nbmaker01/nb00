<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>A-Frame GLB Auto Scale Viewer</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <a-scene>

    <!-- ===================== -->
    <!-- Assets -->
    <!-- ===================== -->
    <a-assets>
      <a-asset-item id="model" src="model.glb"></a-asset-item>
    </a-assets>

    <!-- ===================== -->
    <!-- 카메라 리그 -->
    <!-- ===================== -->
    <a-entity id="rig" position="0 1.6 3">
      <a-entity
        camera
        look-controls
        wasd-controls="acceleration: 25">
      </a-entity>
    </a-entity>

    <!-- ===================== -->
    <!-- 마우스 휠 줌 -->
    <!-- ===================== -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const rig = document.querySelector('#rig');

        window.addEventListener('wheel', (event) => {
          let pos = rig.getAttribute('position');
          const speed = 0.5;

          if (event.deltaY < 0) pos.z -= speed;
          else pos.z += speed;

          rig.setAttribute('position', pos);
        });
      });
    </script>

    <!-- ===================== -->
    <!-- GLB 모델 (자동 크기 조정) -->
    <!-- ===================== -->
    <a-entity
      id="modelEntity"
      gltf-model="#model"
      position="0 0 -2">
    </a-entity>

    <!-- ===================== -->
    <!-- 모델 크기 자동 조정 스크립트 -->
    <!-- ===================== -->
    <script>
      AFRAME.registerComponent('auto-scale', {
        init: function () {
          this.el.addEventListener('model-loaded', () => {
            const obj = this.el.getObject3D('mesh');

            // bounding box 계산
            const box = new THREE.Box3().setFromObject(obj);
            const size = new THREE.Vector3();
            box.getSize(size);

            // 가장 큰 축 기준으로 스케일 계산
            const maxDim = Math.max(size.x, size.y, size.z);

            // 목표 크기 (화면에서 크게 보이도록)
            const desiredSize = 2;

            const scale = desiredSize / maxDim;

            this.el.setAttribute('scale', {
              x: scale,
              y: scale,
              z: scale
            });

            // 모델을 바닥에 맞추기 (Y 위치 보정)
            const center = new THREE.Vector3();
            box.getCenter(center);

            this.el.object3D.position.y -= (center.y - size.y / 2) * scale;
          });
        }
      });

      // 컴포넌트 적용
      document.addEventListener('DOMContentLoaded', () => {
        document
          .querySelector('#modelEntity')
          .setAttribute('auto-scale', '');
      });
    </script>

    <!-- ===================== -->
    <!-- 바닥 -->
    <!-- ===================== -->
    <a-plane
      rotation="-90 0 0"
      width="30"
      height="30"
      color="#7BC8A4">
    </a-plane>

    <!-- ===================== -->
    <!-- 하늘 -->
    <!-- ===================== -->
    <a-sky color="#ECECEC"></a-sky>

    <!-- ===================== -->
    <!-- 조명 -->
    <!-- ===================== -->
    <a-light type="ambient" intensity="0.6"></a-light>

    <a-light
      type="directional"
      position="2 4 3"
      intensity="0.9">
    </a-light>

    <!-- ===================== -->
    <!-- VR 컨트롤러 -->
    <!-- ===================== -->
    <a-entity laser-controls="hand: left"></a-entity>
    <a-entity laser-controls="hand: right"></a-entity>

  </a-scene>
</body>
</html>
